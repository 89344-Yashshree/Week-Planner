name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'WeeklyPlanTracker.sln'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

env:
  DOTNET_VERSION: '8.0.x'
  AZURE_WEBAPP_NAME: weekplanner-api

jobs:
  # ── CI: Build + Test ────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore WeeklyPlanTracker.sln

      - name: Build solution
        run: dotnet build WeeklyPlanTracker.sln --no-restore --configuration Release

      - name: Run Unit Tests
        run: >
          dotnet test
          backend/tests/WeeklyPlanTracker.UnitTests/WeeklyPlanTracker.UnitTests.csproj
          --no-build
          --configuration Release
          --logger "trx;LogFileName=unit-test-results.trx"
          --results-directory ./test-results

      - name: Run Integration Tests
        run: >
          dotnet test
          backend/tests/WeeklyPlanTracker.IntegrationTests/WeeklyPlanTracker.IntegrationTests.csproj
          --no-build
          --configuration Release
          --logger "trx;LogFileName=integration-test-results.trx"
          --results-directory ./test-results

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/*.trx

  # ── CD: Publish + Deploy (main branch only) ─────────────────────────────────
  deploy:
    name: Deploy to Azure Web App
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish
        run: >
          dotnet publish
          backend/src/WeeklyPlanTracker.API/WeeklyPlanTracker.API.csproj
          --configuration Release
          --output ./publish

      - name: Create deployment package
        run: cd publish && zip -r ../app.zip .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        run: |
          az webapp deploy \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group WeekPlanner-RG \
            --src-path app.zip \
            --type zip \
            --clean true
